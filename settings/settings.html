<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>搜索组设置</title>
    <link rel="stylesheet" href="settings.css" />
  </head>
  <body>
    <main class="settings-shell">
      <header class="settings-header">
        <div>
          <p class="settings-eyebrow">搜索组</p>
          <h1>分组与调用内容</h1>
          <p class="settings-subtitle">左边设置搜索组名称与打开方式，右边直接增删该组调用的网站或 AI 模型。</p>
        </div>
        <div class="settings-header-actions">
          <span id="saveStatus" class="save-status">已保存</span>
          <button id="saveSettingsBtn" class="secondary-btn" type="button">保存设置</button>
          <button id="addGroupBtn" class="primary-btn" type="button">新增搜索组</button>
        </div>
      </header>
      <div id="settingsGroups" class="settings-groups"></div>
    </main>
    <script src="../config/baseConfig.js"></script>
    <script src="settings.js"></script>
  </body>
</html>
